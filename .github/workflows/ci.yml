name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS (Swift 6.0)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Cache SPM
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  coverage:
    name: Coverage Gate (macOS)
    runs-on: macos-15
    needs: macos
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Cache SPM
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-
      - name: Test with coverage
        run: swift test --enable-code-coverage
      - name: Check coverage gate
        # Threshold = post-W3 measured coverage (67.0%) rounded down to nearest integer = 67, minus 0.5% tolerance = effective floor 66.5%.
        # Original v0.10.1 baseline was 62.6%; v0.10.2 raised it to 67.0% via gap-targeted test additions.
        # Refresh after coverage-improving PRs by editing the --threshold flag below.
        run: bash scripts/check-coverage.sh --threshold 67 --tolerance 0.5 --summary-out "$GITHUB_STEP_SUMMARY"

  linux:
    name: Linux (Swift 6.0)
    runs-on: ubuntu-latest
    # Pinned to immutable Docker digest to prevent supply-chain attacks via tag mutation (CWE-494).
    # Refresh cadence: quarterly OR on Swift point release (whichever comes first).
    # Refresh procedure:
    #   1. docker pull swift:6.0
    #   2. docker inspect --format='{{index .RepoDigests 0}}' swift:6.0
    #   3. Update the @sha256:... below with the new digest, commit with message
    #      "ci(linux): refresh swift:6.0 digest pin"
    # See SECURITY scan F-03 (CWE-494, 2026-05-12) for context.
    container: swift:6.0@sha256:efe796adab2659a1932f11270fdc8fe733382a98607b8c56879324d82f926a49
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Cache SPM
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-
      - name: Build
        run: swift build
      - name: Test
        run: swift test
